<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<!DOCTYPE html>
<html>
<head>
<style>
body {
    background: #b3e5fc;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
    font-family: Arial, sans-serif;
}

.card {
    width: 450px;
    background: #e3f2fd;
    border-radius: 15px;
    padding: 25px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    position: relative;
    overflow: hidden;
}

/* Top right blue curve */
.card::after {
    content: '';
    position: absolute;
    top: -80px;
    right: -80px;
    width: 200px;
    height: 200px;
    background: #5c8dff;
    border-radius: 50%;
    z-index: 0;
}

.content {
    position: relative;
    z-index: 1;
}

.header {
    display: flex;
    align-items: center;
    gap: 15px;
    margin-bottom: 15px;
}

.profile-img {
    width: 70px;
    height: 70px;
    border-radius: 50%;
    border: 4px solid white;
    object-fit: cover;
}

.name {
    font-size: 24px;
    font-weight: bold;
    margin: 0;
}

.username {
    color: #555;
    margin: 2px 0 0 0;
}

.bio {
    color: #444;
    margin: 15px 0 25px 0;
    line-height: 1.5;
}

.stats {
    display: flex;
    gap: 40px;
    margin-bottom: 20px;
}

.stat b {
    font-size: 20px;
    display: block;
}

.stat span {
    color: #555;
    font-size: 14px;
}

.buttons {
    display: flex;
    gap: 10px;
}

.btn {
    padding: 10px 25px;
    border-radius: 8px;
    font-weight: bold;
    cursor: pointer;
    border: none;
    font-size: 15px;
}

.btn-follow {
    background: black;
    color: white;
}

.btn-profile {
    background: transparent;
    border: 2px solid #333;
    color: #333;
}
</style>
</head>
<body>

<div class="card">
    <div class="content">
        <div class="header">
            <img src="./images (1).jpeg" class="profile-img" alt="profile">
            <div>
                <p class="name">Virat Kohli</p>
                <p class="username">virat.kohli</p>
            </div>
        </div>

        <p class="bio">carpediem!</p>

        <div class="stats">
            <div class="stat">
                <b>1,058</b>
                <span>psts</span>
            </div>
            <div class="stat">
                <b>273M</b>
                <span>Followers</span>
            </div>
            <div class="stat">
                <b>278</b>
                <span>Following</span>
            </div>
        </div>

        <div class="buttons">
            <button class="btn btn-follow">Follow</button>
            <button class="btn btn-profile">View profile</button>
        </div>
    </div>
</div>

</body>
</html>
