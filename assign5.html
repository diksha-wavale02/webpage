<!DOCTYPE html>
<html>
<head>
<style>
body {
    display: flex;
    flex-wrap: wrap;
    gap: 30px;
    padding: 40px;
    justify-content: center;
    font-family: Arial;
    color: white;
    font-weight: bold;
    text-align:center;
    line-height: 50px;
}


.leaf {
    width: 120px;
    height: 120px;
    background: cyan;
    border-radius: 0  100% 0;
}


.half-oval {
    width: 200px;
    height: 100px;
    background: blue;
    border-radius: 0 0 100px 100px;
}


.oval {
    width: 200px;
    height: 100px;
    background: orange;
    border-radius: 50%;
}


.twist {
    width: 200px;
    height: 80px;
    background: green;
    border-radius: 0 100% 0 100%;
}


.twist-two {
    width: 200px;
    height: 100px;
    background: purple;
    border-radius: 0 100% 0 100%;
}


.circle {
    width: 100px;
    height: 100px;
    background: magenta;
    border-radius: 50%;
}


.tab {
    width: 100px;
    height: 100px;
    background: cyan;
    border-radius: 0 0 50% 50%;
}


.three-sided {
    width: 100px;
    height: 100px;
    background: blue;
    border-radius: 0 100% 100% 100%;
}
</style>
</head>
<body>
    <div class="leaf">Leaf</div>
    <div class="half-oval">Half Oval</div>
    <div class="oval">Oval</div>
    <div class="twist">Twist</div>
    <div class="twist-two">Twist Two</div>
    <div class="circle">Circle</div>
    <div class="tab">Tab</div>
    <div class="three-sided">Three Sided</div>
</body>
</html>
